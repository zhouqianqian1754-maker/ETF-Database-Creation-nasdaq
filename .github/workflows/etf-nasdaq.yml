name: ETF Nasdaq Daily Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"

permissions:
  contents: write

jobs:
  run-etf-script:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Hong_Kong

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy selenium webdriver-manager

      - name: Run ETF script
        run: python "ETF nasdaq to github v0.0.py"

      - name: Commit updated CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Daily ETF Nasdaq update"
          git push
