name: ETF Nasdaq Daily Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"

permissions:
  contents: write

jobs:
  run-etf-script:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Hong_Kong
      PYTHONUNBUFFERED: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -U pandas numpy requests

      - name: Show workspace before run
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type d | sort

      - name: Run ETF script
        run: python -u "ETF nasdaq to github v0.0.py"

      - name: Show generated files
        if: always()
        run: |
          echo "=== data folder ==="
          find data -type f | sort || true
          echo "=== debug folder ==="
          find debug -type f | sort || true
          echo "=== git status ==="
          git status --short

      - name: Upload generated CSV files as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etf-data
          path: data/
          if-no-files-found: ignore

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etf-debug
          path: debug/
          if-no-files-found: ignore

      - name: Commit updated CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily ETF Nasdaq update"
            git push
          fi
