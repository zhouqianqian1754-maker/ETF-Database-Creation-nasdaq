name: ETF Nasdaq Daily Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"

permissions:
  contents: write

jobs:
  run-etf-script:
    runs-on: ubuntu-latest

    env:
      TZ: Asia/Hong_Kong

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Google Chrome and matching ChromeDriver
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true
          install-dependencies: true

      - name: Export ChromeDriver path
        run: echo "CHROMEDRIVER_PATH=${{ steps.setup-chrome.outputs.chromedriver-path }}" >> $GITHUB_ENV

      - name: Show browser versions
        run: |
          google-chrome --version || chrome --version
          "$CHROMEDRIVER_PATH" --version
          echo "Chromedriver path: $CHROMEDRIVER_PATH"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy selenium

      - name: Show workspace before run
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type d | sort

      - name: Run ETF script
        run: python "ETF nasdaq to github v0.0.py"

      - name: Show generated files
        run: |
          echo "=== data folder ==="
          find data -type f | sort || true
          echo "=== git status ==="
          git status --short

      - name: Upload generated CSV files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: etf-data
          path: data/

      - name: Commit updated CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Daily ETF Nasdaq update"
          git push
