name: ETF Daily Update

run-name: ETF Daily Update by ${{ github.actor }}

on:
  workflow_dispatch:
  schedule:
    - cron: "35 22 * * *"
      timezone: "Asia/Hong_Kong"
    - cron: "50 3 * * *"
      timezone: "Asia/Hong_Kong"
  push:
    branches:
      - main
    paths:
      - "**.py"
      - ".github/workflows/etf-daily-update.yml"

permissions:
  contents: write

concurrency:
  group: etf-daily-update
  cancel-in-progress: false

jobs:
  update-etf-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: bash
        working-directory: .

    env:
      TZ: Asia/Hong_Kong
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Sync workspace to latest main
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Show workspace before run
        run: |
          set -euo pipefail
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          pwd
          ls -la
          find . -maxdepth 3 -type f | sort

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -U pandas numpy requests

      - name: Run ETF update script
        run: |
          set -euo pipefail
          python "ETF nasdaq to github.py"

      - name: Show generated files
        if: always()
        run: |
          echo "=== data folder ==="
          find data -type f | sort || true
          echo "=== debug folder ==="
          find debug -type f | sort || true
          echo "=== git status ==="
          git status --short || true

      - name: Upload data artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etf-data-${{ github.run_id }}
          path: data/
          if-no-files-found: ignore

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etf-debug-${{ github.run_id }}
          path: debug/
          if-no-files-found: ignore

      - name: Commit and push updated files
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/ debug/

          echo "=== staged changes ==="
          git diff --cached --stat || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Daily ETF Nasdaq update"
          git push origin HEAD:main
