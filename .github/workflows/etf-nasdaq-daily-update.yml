name: ETF Nasdaq Daily Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * *"
      timezone: "Asia/Hong_Kong"

permissions:
  contents: write

concurrency:
  group: etf-nasdaq-daily-update
  cancel-in-progress: false

jobs:
  run-etf-script:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    env:
      TZ: Asia/Hong_Kong
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync workspace to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -U pandas numpy requests

      - name: Run ETF script
        run: python -u "ETF nasdaq to github v0.0.py"

      - name: Commit and push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ debug/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Daily ETF Nasdaq update"
          git push origin main
