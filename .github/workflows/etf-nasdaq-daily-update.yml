name: ETF Analysis

run-name: ETF analysis by ${{ github.actor }}

on:
  workflow_dispatch:
  schedule:
    - cron: "15 23 * * *"
      timezone: "Asia/Hong_Kong"
  push:
    branches:
      - main
    paths:
      - "**.py"
      - ".github/workflows/etf-analysis.yml"

permissions:
  contents: write

concurrency:
  group: etf-analysis-daily
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: bash
        working-directory: .

    env:
      TZ: Asia/Hong_Kong
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout analysis repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Sync analysis repo to latest main
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Checkout database repo
        uses: actions/checkout@v4
        with:
          repository: zhouqianqian1754-maker/ETF-Database-Creation-nasdaq
          path: ETF-Database-Creation-nasdaq

      - name: Show workspace
        run: |
          set -euo pipefail
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          pwd
          ls -la
          find . -maxdepth 3 -type f | sort

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pandas numpy scipy requests yfinance

      - name: Run analysis
        run: |
          set -euo pipefail
          python "ETF_integrated_analysis_github.py"

      - name: Show output files
        if: always()
        run: |
          echo "=== output folder ==="
          find output -type f | sort || true
          echo "=== git status ==="
          git status --short || true

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etf-analysis-results-${{ github.run_id }}
          path: output/
          if-no-files-found: warn

      - name: Commit and push outputs
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add output/

          echo "=== staged changes ==="
          git diff --cached --stat || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update ETF analysis outputs"
          git push origin HEAD:main
